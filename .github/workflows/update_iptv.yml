name: Otomatik Yayın Güncelleyici

on:
  schedule:
    # Her 3 saatte bir çalıştırır. Token süresine göre değiştirebilirsin.
    # Dakika Saat Gün Ay HaftanınGünü (UTC saati kullanır)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Manuel olarak da butona basarak çalıştırabilmeni sağlar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Çek (Checkout)
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium

      - name: Botu Çalıştır (Linkleri Güncelle)
        run: python main.py

      - name: Dosyaları GitHub'a Pushla (Yükle)
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add kanallar/* playlist.m3u
          git commit -m "Otomatik Güncelleme: Yeni yayın linkleri alındı" || echo "Değişiklik yok"
          git push
